<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suot | Friends</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../dashboard/dashboard.css"/>
  <link rel="stylesheet" href="friends.css"/>
</head>
<body class="dash-body">

<aside class="side-nav">
  <div class="nav-brand">
    <img src="../auth/Logo/logo.jpg" alt="Suot" class="dash-logo">
    <p class="logo-tagline">Style passed on.</p>
  </div>
  <div class="user-profile-card" onclick="location.href='../profile/profile.html'" style="cursor:pointer;">
    <div class="avatar-wrapper"><img id="navAv" src="https://ui-avatars.com/api/?name=U&background=EBE0E3&color=C994A7" alt=""/></div>
    <div class="user-meta"><h4 id="navName">Loading...</h4><p>Pro Swapper</p></div>
  </div>
  <div class="category-list">
    <p class="category-label">Browse Catalog</p>
    <button class="cat-link" onclick="location.href='../dashboard/dashboard.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>All Pieces
    </button>
    <button class="cat-link" onclick="location.href='../dashboard/dashboard.html?filter=tops'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.57a1 1 0 00.99.84H7v10c0 .55.45 1 1 1h8c.55 0 1-.45 1-1V10h4.15a1 1 0 00.99-.84l.58-3.57a2 2 0 00-1.34-2.23z"/></svg>Tops
    </button>
    <button class="cat-link" onclick="location.href='../dashboard/dashboard.html?filter=bottoms'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2h12l2 7H4L6 2z"/><path d="M4 9l2 13h5l1-8 1 8h5l2-13"/></svg>Bottoms
    </button>
    <button class="cat-link" onclick="location.href='../dashboard/dashboard.html?filter=accessories'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>Accessories
    </button>
    <p class="category-label" style="margin-top:25px">My Closet</p>
    <button class="cat-link" onclick="location.href='post-item.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Post an Item
    </button>
    <button class="cat-link" onclick="location.href='wishlist.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Wishlist
    </button>
    <p class="category-label" style="margin-top:25px">Community</p>
    <button class="cat-link" onclick="location.href='../personal/home.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
    </button>
    <button class="cat-link" onclick="location.href='../dashboard/wallet.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Wallet
    </button>
    <button class="cat-link" onclick="location.href='message.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Messages
      <span class="nav-badge" id="msgBadge"></span>
    </button>
    <button class="cat-link" onclick="location.href='../dashboard/topup.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Top Up Points
    </button>
    <button class="cat-link active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Friends
    </button>
  </div>
  <button class="btn-logout" onclick="doLogout()">Logout</button>
</aside>

<main class="main-content">
  <div class="fr-layout">

    <!-- LEFT PANEL -->
    <div class="fr-left">
      <div class="fr-hero">
        <div class="fr-eyebrow">Community</div>
        <h1 class="fr-title">Friends &amp;<br/>Followers</h1>
        <p class="fr-sub">Follow swappers you love.<br/>When they follow back — you're friends.</p>
      </div>

      <div class="fr-stats">
        <div class="fr-stat active" id="stat-friends" onclick="switchTab('friends')">
          <div class="fr-stat-n" id="cnt-friends">0</div>
          <div class="fr-stat-l">Friends</div>
        </div>
        <div class="fr-stat" id="stat-followers" onclick="switchTab('followers')">
          <div class="fr-stat-n" id="cnt-followers">0</div>
          <div class="fr-stat-l">Followers</div>
        </div>
        <div class="fr-stat" id="stat-following" onclick="switchTab('following')">
          <div class="fr-stat-n" id="cnt-following">0</div>
          <div class="fr-stat-l">Following</div>
        </div>
      </div>

      <div class="fr-tabs" style="margin-top:18px;">
        <button class="fr-tab active" id="tab-friends" onclick="switchTab('friends')">
          <span class="fr-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="width:1.05em;height:1.05em;display:inline-block;vertical-align:-0.15em;"><path d="M7.5 13.5c1.5 1.5 3.2 2.3 4.5 2.3 1.4 0 3.2-.8 4.5-2.3"/><path d="M7 12c-1.2-1.2-2-2.3-2-3.6 0-1.4 1.1-2.4 2.4-2.4 1 0 1.8.6 2.6 1.4"/><path d="M17 12c1.2-1.2 2-2.3 2-3.6 0-1.4-1.1-2.4-2.4-2.4-1 0-1.8.6-2.6 1.4"/></svg></span>
          <span class="fr-tab-label">Friends</span>
          <span class="fr-tab-badge" id="tbadge-friends">0</span>
        </button>
        <button class="fr-tab" id="tab-followers" onclick="switchTab('followers')">
          <span class="fr-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="width:1.05em;height:1.05em;display:inline-block;vertical-align:-0.15em;"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="20 8 20 14 16 12"/></svg></span>
          <span class="fr-tab-label">Followers</span>
          <span class="fr-tab-badge" id="tbadge-followers">0</span>
        </button>
        <button class="fr-tab" id="tab-following" onclick="switchTab('following')">
          <span class="fr-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="width:1.05em;height:1.05em;display:inline-block;vertical-align:-0.15em;"><path d="m12 17.27 4.8-3.86a4 4 0 0 0 2.2-3.41V8a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v1.99a4 4 0 0 0 2.2 3.41L12 17.27z" stroke-width="2.4"/><circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"/></svg></span>
          <span class="fr-tab-label">Following</span>
          <span class="fr-tab-badge" id="tbadge-following">0</span>
        </button>
        <button class="fr-tab" id="tab-find" onclick="switchTab('find')">
          <span class="fr-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="width:1.05em;height:1.05em;display:inline-block;vertical-align:-0.15em;"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35" stroke-width="2.4"/></svg></span>
          <span class="fr-tab-label">Find People</span>
        </button>
      </div>

      <div class="fr-search-block">
        <div class="fr-sw">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="fr-search" id="frSearch" type="text" placeholder="Filter by name..." oninput="filterCards(this.value)"/>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="fr-right">
      <div class="fr-right-hdr">
        <div class="fr-right-title" id="rightTitle">Friends</div>
        <div class="fr-right-sub" id="rightSub">People who follow each other</div>
      </div>
      <div class="fr-content" id="frContent">
        <div class="ldr"><div class="spin"></div> Loading...</div>
      </div>
    </div>

  </div>
</main>

<div class="toast" id="toast"></div>

 <script type="module" src="friends.js"></script>
</body>
</html>
